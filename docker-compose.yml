services:
  app:
    build: .
    ports:
      - "4174:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_BACKEND: sqlite
      APP_DB_PATH: /app/data/app.db
      FILE_STORAGE_BACKEND: local
      APP_UPLOADS_DIR: /app/uploads
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
